task: csqa_gen
dataset_path: tau/commonsense_qa
training_split: train
validation_split: validation
output_type: generate_until          

doc_to_text: "<query>{{ question.strip() }}\nA. {{choices['text'][0]}}\nB. {{choices['text'][1]}}\nC. {{choices['text'][2]}}\nD. {{choices['text'][3]}}\nE. {{choices['text'][4]}}</query>\n<thought>"
doc_to_target: answerKey

filter_list:
  - name: "extract_answer"
    filter:
      - function: "regex"
        regex_pattern: "<answer>(.*?)</answer>"
      - function: "take_first"

metadata:
  version: 0

