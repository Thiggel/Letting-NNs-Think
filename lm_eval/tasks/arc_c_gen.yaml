task: arc_c_gen
dataset_path: allenai/ai2_arc
dataset_name: ARC-Challenge
output_type: generate_until
training_split: train
validation_split: validation
test_split: test
fewshot_split: train
doc_to_text: 'Task: answer the question detailed inside <query></query>. Reason about it inside <thought></thought>. In the end, give only the answer (A, B, C, or D) inside <answer></answer>.\n<query>{{question.strip()}}\nA. {{choices.text[0]}}\nB. {{choices.text[1]}}\nC. {{choices.text[2]}}{% if choices.text|length > 3 %}\nD. {{choices.text[3]}}{% endif %}</query><thought>'
fewshot_delimiter: "\n\n"
doc_to_target: "{{ 'ABCD'[answerKey|int - 1] if answerKey|string in '1234' else answerKey }}"
num_fewshot: 0
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
filter_list:
  - name: remove_whitespace
    filter:
      - function: remove_whitespace
      - function: take_first
  - name: "extract_answer"
    filter:
      - function: "regex"
        regex_pattern: "<answer>(.*?)</answer>"
      - function: "take_first"
metadata:
  version: 1.0
