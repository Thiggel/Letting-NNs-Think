task: piqa_gen
dataset_path: piqa
training_split: train
validation_split: validation
output_type: generate_until          

doc_to_text: "Question: {{ goal.strip() }}\n 0. {{ sol1 }},\n1. {{ sol2 }}. In the end, give either 0 or 1 as the answer.\nAnswer:"
doc_to_target: label

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: false
    regexes_to_ignore:
      - ","
      - "\\$"
      - "(?s).*#### "
      - "\\.$"
generation_kwargs:
  until:
    - "Question:"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
repeats: 1
num_fewshot: 0
filter_list:
  - name: "strict-match"
    filter:
      - function: "regex"
        regex_pattern: "#### (\\-?[0-9\\.\\,]+)"
      - function: "take_first"
  - name: "flexible-extract"
    filter:
      - function: "regex"
        group_select: -1
        regex_pattern: "(-?[$0-9.,]{2,})|(-?[0-9]+)"
      - function: "take_first"

metadata:
  version: 0


dataset_kwargs:
  trust_remote_code: true

